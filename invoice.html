<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriMeth Invoice</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g1: #668621;
      --g2: #1c6631;
      --green-grad: linear-gradient(90deg, #668621 0%, #1c6631 100%);
      --white: #ffffff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #e8ede0;
      min-height: 100vh;
      padding: 0;
    }

    .screen-toolbar {
      background: linear-gradient(90deg, #668621, #1c6631);
      padding: 14px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.15);
      flex-wrap: wrap;
      gap: 10px;
    }

    .toolbar-brand {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .toolbar-right {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-back {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      padding: 9px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }
    .btn-back:hover { background: rgba(255, 255, 255, 0.25); }

    .btn-print {
      background: #fff;
      color: #1c6631;
      border: none;
      border-radius: 8px;
      padding: 9px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }
    .btn-print:hover { opacity: 0.88; transform: translateY(-1px); }

    .invoice-stage {
      display: flex;
      justify-content: center;
      padding: 36px 20px 60px;
      gap: 32px;
      flex-wrap: wrap;
    }

    /* ── A4 INVOICE PAGE ── */
    .invoice-page {
      width: 794px;
      min-height: 1123px;
      background: #fff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.18);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ═══ TOP HEADER BAR ═══ */
    .inv-header {
      position: relative;
      width: 100%;
      height: 108px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 44px;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .inv-header .upperGraphics {
      width: 1000px;
      position: absolute;
      top: 0;
      right: 0;
    }

    .upperGraphicsBANK {
      width: 100%;
      position: absolute;
      top: 0;
      right: 0;
    }

    .bb-title, .bb-val, .bb-label {
      position: relative;
      z-index: 99999;
    }

    .inv-header-logo { position: relative; z-index: 1111; }
    .inv-header-title { position: relative; z-index: 1111; }

    .inv-header-logo .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 45px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      /* letter-spacing: 0.5px; */
    }

    .inv-header-logo .brand-tag {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: 1.8px;
      text-transform: uppercase;
      margin-top: 3px;
              font-family: "Lato", sans-serif;


    }

    .inv-header-title {
        font-family: "Lato", sans-serif;
      font-size: 52px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ═══ BILL TO + INVOICE META ═══ */
    .inv-meta-section {
      padding: 28px 44px 20px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    .bill-to-block .section-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #1c1c1c;
      margin-bottom: 10px;
    }

    .bill-to-block .field-row {
      display: flex;
      gap: 6px;
      margin-bottom: 5px;
      font-size: 13.5px;
      line-height: 1.5;
    }

    .bill-to-block .field-row .fl { color: #555; font-weight: 400; min-width: 110px; }
    .bill-to-block .field-row .fv { color: #1a2e1a; font-weight: 700; }

    .meta-block { text-align: right; min-width: 220px; }

    .meta-block .meta-row {
      display: flex;
      justify-content: flex-end;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 6px;
      font-size: 13.5px;
    }

    .meta-block .ml { color: #555; }
    .meta-block .mv { font-weight: 700; color: #1a2e1a; }

    /* Payment status badge */
    .payment-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .payment-badge.Paid    { background: #e8f5e9; color: #1c6631; border: 1px solid #a5d6a7; }
    .payment-badge.Unpaid  { background: #fdecea; color: #c0392b; border: 1px solid #f5c6c0; }
    .payment-badge.Partial { background: #fff8e1; color: #c07800; border: 1px solid #ffe082; }

    /* ═══ TABLE ═══ */
    .inv-table-wrap {
      padding: 0 44px;
      margin-top: 4px;
      margin-bottom: 0;
    }

    .inv-table {
      width: 100%;
      border-collapse: collapse;
    }

    .inv-table thead tr {
      background: linear-gradient(90deg, #668621 0%, #1c6631 100%);
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
      position: relative;
      z-index: 2;
    }

    .inv-table thead th {
      padding: 13px 18px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.4px;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .inv-table thead th:nth-child(2),
    .inv-table thead th:nth-child(3),
    .inv-table thead th:nth-child(4),
    .inv-table thead th:nth-child(5) { text-align: center; }

    .inv-table tbody tr { border-top: 1px solid #ddebc8; }
    .inv-table tbody tr:first-child { border-top: none; }

    .inv-table tbody td {
      padding: 14px 18px;
      font-size: 13px;
      color: #1a2e1a;
      vertical-align: middle;
    }

    .inv-table tbody td:nth-child(2),
    .inv-table tbody td:nth-child(3),
    .inv-table tbody td:nth-child(4),
    .inv-table tbody td:nth-child(5) { text-align: center; }

    .inv-table tbody td:nth-child(5) { font-weight: 700; }

    .inv-table tbody tr.empty-filler td {
      padding: 12px 18px;
      color: transparent;
      font-size: 13px;
    }

    /* ═══ BOTTOM SECTION ═══ */
    .inv-bottom {
      position: absolute;
      bottom: -10px;
      left: 0;
      right: 0;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .inv-bottom > svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block !important;
      visibility: visible !important;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .inv-totals-row {
      display: flex;
      justify-content: flex-end;
      padding: 0 44px;
      margin-top: 16px;
      margin-bottom: 0;
    }

    .inv-totals-table { font-size: 13px; color: #1a2e1a; min-width: 220px; }

    .inv-totals-table .tr {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      gap: 40px;
    }

    .inv-totals-table .tr .tl { color: #444; }
    .inv-totals-table .tr .tv { font-weight: 700; text-align: right; }
    .inv-totals-table .tr.grand .tl,
    .inv-totals-table .tr.grand .tv { font-weight: 800; font-size: 14px; color: #1c6631; }

    .bank-box {
      position: absolute;
      left: 44px;
      bottom: 150px;
      width: 220px;
      border-radius: 12px;
      padding: 18px 20px;
      color: #fff;
      z-index: 10;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .bank-box .bb-title { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 10px; }
    .bank-box .bb-label { font-size: 11px; color: rgba(255,255,255,0.7); letter-spacing: 0.5px; margin-bottom: 2px; }
    .bank-box .bb-val   { font-size: 12.5px; font-weight: 500; color: #fff; margin-bottom: 10px; word-break: break-all; }

    .terms-block {
      position: absolute;
      left: 44px;
      bottom: 150px;
      max-width: 230px;
      z-index: 10;
      display: none;
    }
    .terms-block .t-title { font-size: 12.5px; font-weight: 700; color: #1a2e1a; margin-bottom: 4px; }
    .terms-block .t-body  { font-size: 11px; color: #444; line-height: 1.6; }

    .contact-block {
      position: absolute;
      right: 44px;
      bottom: 65px;
      display: flex !important;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
      align-items: flex-end;
      visibility: visible !important;
      min-width: 200px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 9px;
      justify-content: flex-end;
    }

    .contact-item .ci-text {
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      text-align: right;
      white-space: nowrap;
    }

    .contact-item .ci-icon {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      display: flex !important;
      align-items: center;
      justify-content: center;
      visibility: visible !important;
    }

    .contact-item .ci-icon svg {
      display: block !important;
      visibility: visible !important;
      overflow: visible;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .page-break { page-break-after: always; }

    .no-data {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 500px;
      gap: 16px;
      color: #669;
    }
    .no-data h2 { font-size: 22px; font-weight: 700; }
    .no-data p  { font-size: 14px; opacity: 0.7; }
    .no-data a  { color: #1c6631; font-weight: 700; text-decoration: none; }

    .table-Box {
      position: absolute;
      top: 100px;
      width: 90%;
      height: 50%;
      display: none;
    }

    /* ═══ PRINT STYLES ═══ */
    @media print {
      html, body { margin: 0; padding: 0; background: #fff !important; }

      .screen-toolbar { display: none !important; }

      .invoice-stage {
        display: block !important;
        padding: 0 !important;
        background: #fff !important;
      }

      .invoice-page {
        width: 210mm;
        height: 290mm;
        box-shadow: none !important;
        border-radius: 0 !important;
        page-break-after: always;
        margin: 0 auto;
        overflow: visible !important;
        position: relative !important;
      }

      .invoice-page:last-child { page-break-after: avoid; }

      @page { size: A4 portrait; margin: 0; }

      * {
        print-color-adjust: exact !important;
        -webkit-print-color-adjust: exact !important;
      }

      .inv-bottom {
        position: absolute !important;
        bottom: -10px !important;
        left: 0 !important;
        right: 0 !important;
        height: 305px !important;
        overflow: visible !important;
        display: block !important;
        visibility: visible !important;
        print-color-adjust: exact !important;
        -webkit-print-color-adjust: exact !important;
      }

      .contact-block {
        display: flex !important;
        visibility: visible !important;
        position: absolute !important;
        right: 44px !important;
        bottom: 70px !important;
      }

      .contact-item, .contact-item .ci-text, .contact-item .ci-icon {
        display: flex !important;
        visibility: visible !important;
      }
    }


    /* ============================= */
/* 📱 SCREEN RESPONSIVE SCALE   */
/* ============================= */

@media (max-width: 900px) {

  .invoice-stage {
    padding: 20px 10px;
  }

  .invoice-page {
    transform: scale(0.85);
    transform-origin: top center;
  }
}

@media (max-width: 600px) {

  .invoice-page {
    transform: scale(0.65);
  }
}

@media (max-width: 420px) {

  .invoice-page {
    transform: scale(0.55);
  }
}

@media print {
  .invoice-page {
    transform: scale(1) !important;
  }
}

@media (max-width: 600px) {

  /* .inv-header {
    flex-direction: column;
    align-items: flex-start;
    height: auto;
    padding: 20px;
    gap: 10px;
  }

  .inv-header-title {
    font-size: 28px;
  }

  .inv-header-logo .brand-name {
    font-size: 26px;
  } */
}


/* 📱 MOBILE VIEW (SCREEN ONLY) */
@media screen and (max-width: 900px) {

  .invoice-stage {
    overflow-x: auto;
    padding: 20px 10px;
  }

  .invoice-page {
    transform: scale(0.75);
    transform-origin: top center;
    margin: 0 auto;
  }

}

/* 📱 EXTRA SMALL MOBILE */
@media screen and (max-width: 500px) {

  .invoice-page {
    transform: scale(0.4);
  }

}
  </style>
</head>

  <script src="supabase.js"></script>
  <script>
    const MAX_PER_PAGE = 8;
    const MAX_PRODUCTS = 8;

    const DEFAULTS = {
      contactPhone: '+92 3368936834',
      contactEmail: 'nutrimethofficial@gmail.com',
      contactWeb:   'www.nutrimeth.com',
      contactAddr:  'Scheme 33 post office society',
    };

    function fmtMoney(v) {
      return 'Rs. ' + Number(v).toLocaleString('en-PK', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtDate(str) {
      if (!str) return '';
      const d = new Date(str);
      if (isNaN(d)) return str;
      return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function buildInvoicePage(data, rows, pageNum, totalPages, isLast) {
      const page = document.createElement('div');
      page.className = 'invoice-page' + (isLast ? '' : ' page-break');

      const header = `
        <div class="inv-header">
          <div class="inv-header-logo">
            <div class="brand-name">NutriMeth</div>
            <div class="brand-tag">Pure By Nature Trusted By You</div>
          </div>
          <div class="inv-header-title">INVOICE</div>
          <img class="upperGraphics" src="images/UPER GRAPHICS.svg">
        </div>`;

      const payStatus = escHtml(data.paymentStatus || 'Unpaid');
      const meta = `
        <div class="inv-meta-section">
          <div class="bill-to-block">
            <div class="section-label">Bill To</div>
            <div class="field-row"><span class="fl">Client Name :</span><span class="fv">${escHtml(data.clientName) || '—'}</span></div>
            <div class="field-row"><span class="fl">Client Number:</span><span class="fv">${escHtml(data.clientPhone) || '—'}</span></div>
            <div class="field-row"><span class="fl">Client Address:</span><span class="fv">${escHtml(data.clientAddress) || '—'}</span></div>
          </div>
          <div class="meta-block">
            <div class="meta-row"><span class="ml">Invoice Number :</span><span class="mv">${escHtml(data.invoiceNumber)}</span></div>
            <div class="meta-row"><span class="ml">Invoice Date :</span><span class="mv">${escHtml(data.invoiceDate)}</span></div>
            <div class="meta-row"><span class="ml">Due Date :</span><span class="mv">${fmtDate(data.dueDate)}</span></div>
            <div class="meta-row"><span class="ml">Payment Status :</span><span class="mv"><span class="payment-badge ${payStatus}">${payStatus}</span></span></div>
            ${totalPages > 1 ? `<div class="meta-row" style="color:#999;font-size:12px;margin-top:4px"><span class="ml">Page</span><span class="mv" style="font-size:12px;color:#999">${pageNum} of ${totalPages}</span></div>` : ''}
          </div>
        </div>`;

      const tableRows = rows.map(r => `
        <tr>
          <td>${escHtml(r.product)}</td>
          <td>${escHtml(r.size || '')}</td>
          <td>${r.qty}</td>
          <td>${fmtMoney(r.price)}</td>
          <td>${fmtMoney(r.total)}</td>
        </tr>`).join('');

      const fillerCount = Math.max(0, MAX_PER_PAGE - rows.length);
      const fillers = Array(fillerCount).fill(`<tr class="empty-filler"><td>&nbsp;</td><td></td><td></td><td></td><td></td></tr>`).join('');

      const table = `
        <div class="inv-table-wrap">
          <table class="inv-table">
            <thead>
              <tr>
                <th style="width:38%">Item Description</th>
                <th style="width:12%">Size</th>
                <th style="width:10%">Qty</th>
                <th style="width:18%">Price</th>
                <th style="width:22%">Total</th>
              </tr>
            </thead>
            <tbody>
              ${tableRows}
              ${fillers}
            </tbody>
          </table>
        </div>`;

      let totals = '';
      if (isLast) {
        totals = `
          <div class="inv-totals-row">
            <div class="inv-totals-table">
              <div class="tr"><span class="tl">Sub Total :</span><span class="tv">${fmtMoney(data.subtotal)}</span></div>
              <div class="tr"><span class="tl">Tax Vat (${data.taxRate}%) :</span><span class="tv">${fmtMoney(data.taxAmt)}</span></div>
              <div class="tr grand"><span class="tl">Total :</span><span class="tv">${fmtMoney(data.grandTotal)}</span></div>
            </div>
          </div>`;
      }

      let bottom = '';
      if (isLast) {
        const wave = `<img src="images/LOWER GRAPHICS2.svg">`;

        const bankBox = (data.bankAccount || data.bankVirtual) ? `
          <div class="bank-box">
            <img class="upperGraphicsBANK" src="images/BANCK DETAILS.svg">
            <div class="bb-title">Bank Transfer :</div>
            ${data.bankAccount ? `<div class="bb-label">Account Number :</div><div class="bb-val">${escHtml(data.bankAccount)}</div>` : ''}
            ${data.bankVirtual ? `<div class="bb-label">Virtual Number :</div><div class="bb-val">${escHtml(data.bankVirtual)}</div>` : ''}
          </div>` : '';

        const terms = data.termsText ? `
          <div class="terms-block">
            <div class="t-title">Terms And Conditions</div>
            <div class="t-body">${escHtml(data.termsText)}</div>
          </div>` : '';

        const contactItems = [
          { icon: 'icon-whatsapp', text: escHtml(data.contactPhone || DEFAULTS.contactPhone) },
          { icon: 'icon-email',    text: escHtml(data.contactEmail || DEFAULTS.contactEmail) },
          { icon: 'icon-web',      text: escHtml(data.contactWeb   || DEFAULTS.contactWeb) },
          { icon: 'icon-location', text: escHtml(data.contactAddr  || DEFAULTS.contactAddr) },
        ];

        const contactHtml = contactItems.map(ci => `
          <div class="contact-item">
            <span class="ci-text">${ci.text}</span>
            <span class="ci-icon">
              <svg width="28" height="28" style="overflow:visible;display:block">
                <use href="#${ci.icon}"/>
              </svg>
            </span>
          </div>`).join('');

        bottom = `
          <div class="inv-bottom">
            ${wave}
            ${bankBox}
            ${terms}
            <div class="contact-block">${contactHtml}</div>
          </div>`;
      }

      page.innerHTML = header + meta + table + totals + bottom;
      return page;
    }

    async function renderInvoice() {
      const stage = document.getElementById('invoiceStage');
      const raw = localStorage.getItem('nm_invoice_data');

      if (!raw) {
        stage.innerHTML = `<div class="no-data"><h2>No Invoice Data Found</h2><p>Please fill in the form first.</p><a href="index.html">← Go to Form</a></div>`;
        return;
      }

      let data;
      try { data = JSON.parse(raw); }
      catch (e) {
        stage.innerHTML = '<div class="no-data"><h2>Error loading data.</h2><a href="index.html">← Go to Form</a></div>';
        return;
      }

      // Load contact from global config if available
      try {
        const cfg = await loadGlobalConfig();
        if (cfg && cfg.contact) {
          data.contactPhone = cfg.contact.phone || data.contactPhone;
          data.contactEmail = cfg.contact.email || data.contactEmail;
          data.contactWeb   = cfg.contact.web   || data.contactWeb;
          data.contactAddr  = cfg.contact.addr  || data.contactAddr;
        }
      } catch(e) {}

      const allRows = (data.rows || []).slice(0, MAX_PRODUCTS);
      const pages = [];
      for (let i = 0; i < allRows.length; i += MAX_PER_PAGE) {
        pages.push(allRows.slice(i, i + MAX_PER_PAGE));
      }
      if (pages.length === 0) pages.push([]);

      stage.innerHTML = '';
      pages.forEach((pageRows, idx) => {
        const isLast = idx === pages.length - 1;
        stage.appendChild(buildInvoicePage(data, pageRows, idx + 1, pages.length, isLast));
      });
    }

    renderInvoice();
  </script>
