<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriMeth – Form Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark: #1c6631;
    --green-mid: #2d7a3a;
    --green-light: #668621;
    --green-grad: linear-gradient(90deg, #668621 0%, #1c6631 100%);
    --bg: #f4f7f0;
    --border: #c8ddb0;
    --text: #1a2e1a;
    --label: #3d5c2a;
    --shadow: 0 4px 24px rgba(28,102,49,0.10);
  }

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }

  header {
    background: var(--green-grad);
    padding: 0 40px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 16px rgba(28,102,49,0.25);
    flex-wrap: wrap;
    gap: 8px;
  }
  header .brand .name { font-family: 'Playfair Display', serif; font-size: 26px; color: #fff; }
  header .brand .tagline { font-size: 11px; color: rgba(255,255,255,0.75); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }
  .btn-header {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 16px;
    border-radius: 20px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
  }
  .btn-header:hover { background: rgba(255,255,255,0.3); }
  .header-badge {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 20px;
  }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .page { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green-light);
    margin-bottom: 16px;
    padding-left: 12px;
    border-left: 3px solid var(--green-light);
  }

  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 32px;
    margin-bottom: 24px;
    border: 1px solid rgba(102,134,33,0.1);
  }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; font-weight: 600; color: var(--label); letter-spacing: 0.5px; text-transform: uppercase; }
  input, select, textarea {
    font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text);
    background: #fff; border: 1.5px solid var(--border); border-radius: 8px;
    padding: 10px 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--green-mid);
    box-shadow: 0 0 0 3px rgba(45,122,58,0.12);
  }
  textarea { resize: vertical; min-height: 60px; }

  /* Product list */
  .product-list { display: flex; flex-direction: column; gap: 10px; }
  .product-row {
    display: flex;
    gap: 10px;
    align-items: center;
    background: #f8faf4;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
  }
  .product-row input { flex: 2; min-width: 0; }
  .product-row input.price-f { flex: 1; min-width: 0; }
  .product-row input.group-f { flex: 1.5; min-width: 0; }
  .product-row .row-label { font-size: 11px; font-weight: 600; color: #778; white-space: nowrap; }
  .btn-del-sm {
    background: none;
    border: 1.5px solid #e74c3c;
    color: #e74c3c;
    border-radius: 6px;
    width: 30px;
    height: 30px;
    cursor: pointer;
    font-size: 15px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .btn-del-sm:hover { background: #e74c3c; color: #fff; }

  .btn-add-sm {
    background: var(--green-grad);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: opacity 0.2s;
    margin-top: 10px;
  }
  .btn-add-sm:hover { opacity: 0.88; }

  /* Size list */
  .size-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .size-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #f0f5ea;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px;
    font-weight: 500;
  }
  .size-chip button {
    background: none;
    border: none;
    color: #c0392b;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
    display: flex;
    align-items: center;
  }
  .size-add-row { display: flex; gap: 10px; align-items: center; margin-top: 4px; }
  .size-add-row input { width: 160px; }

  /* Actions */
  .actions { display: flex; justify-content: flex-end; gap: 14px; margin-top: 8px; flex-wrap: wrap; }
  .btn-save {
    background: var(--green-grad);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 36px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(28,102,49,0.25);
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-save:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-reset2 {
    background: #fff;
    color: var(--green-dark);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .btn-reset2:hover { border-color: var(--green-mid); }

  .toast {
    position: fixed; bottom: 30px; right: 30px;
    background: var(--green-dark); color: #fff;
    padding: 14px 24px; border-radius: 10px; font-size: 14px;
    font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none; z-index: 999;
    max-width: calc(100vw - 60px);
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(244,247,240,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; font-size: 16px; color: var(--green-dark); font-weight: 600;
  }

  @media (max-width: 600px) {
    header { height: auto; padding: 12px 16px; }
    .page { padding: 20px 12px 60px; }
    .card { padding: 20px 16px; }
    .grid-2 { grid-template-columns: 1fr; }
    .product-row { flex-wrap: wrap; }
  }

  @media (max-width: 600px) {

  .product-row {
    display: grid;
    grid-template-columns: 1fr 1fr; /* 2 columns */
    gap: 8px;
    align-items: center;
  }

  .product-row .row-label {
    grid-column: span 2; /* label full width */
    font-size: 10px;
    color: #889;
  }

  .product-row input {
    width: 100%;
  }

  .product-row .price-f {
    grid-column: span 1;
  }

  .product-row .group-f {
    grid-column: span 1;
  }

  .product-row button {
    grid-column: span 2;
    justify-self: end;
  }
}


@media (max-width: 600px) {

  .product-row {
    display: block;
    position: relative;
    padding: 14px 12px;
    border-radius: 12px;
    background: #f8faf4;
    border: 1px solid var(--border);
  }

  .product-row .row-label {
    display: block;
    font-size: 11px;
    margin-bottom: 3px;
    color: #667;
  }

  .product-row input {
    width: 100%;
    margin-bottom: 10px;
    font-size: 14px;
  }

  /* ❌ button ko top right le jao */
  .product-row .btn-del-sm {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 20px;
    height: 20px;
    font-size: 13px;
  }

}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="name">NutriMeth</div>
    <div class="tagline">Form Editor</div>
  </div>
  <div class="header-right">
    <a class="btn-header" href="index.html">← Invoice Creator</a>
    <span class="header-badge">Admin Editor</span>
  </div>
</header>

<div id="loadingOverlay" class="loading-overlay">Loading configuration…</div>

<div class="page">

  <!-- CONTACT DETAILS -->
  <div class="card">
    <div class="section-title">Contact Details</div>
    <div class="grid-2">
      <div class="field">
        <label>WhatsApp / Phone</label>
        <input type="text" id="ctPhone" placeholder="03368936834">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="ctEmail" placeholder="nutrimethofficial@gmail.com">
      </div>
      <div class="field">
        <label>Website</label>
        <input type="text" id="ctWeb" placeholder="www.nutrimeth.com">
      </div>
      <div class="field">
        <label>Office Address</label>
        <input type="text" id="ctAddr" placeholder="Scheme 33 post office society">
      </div>
    </div>
    <p style="font-size:12px;color:#778;margin-top:10px">
      These details appear on every invoice. Leave blank to use existing values.
    </p>
  </div>

  <!-- SIZES -->
  <div class="card">
    <div class="section-title">Product Sizes</div>
    <div class="size-list" id="sizeList"></div>
    <div class="size-add-row">
      <input type="text" id="newSizeInput" placeholder="e.g. 2 Liter">
      <button class="btn-add-sm" onclick="addSize()">+ Add Size</button>
    </div>
  </div>

  <!-- PRODUCTS -->
  <div class="card">
    <div class="section-title">Products</div>
    <p style="font-size:12px;color:#778;margin-bottom:16px">Name, Group (category), and Base Price (for 100ml). Size prices calculated automatically.</p>
    <div class="product-list" id="productList"></div>
    <button class="btn-add-sm" onclick="addProduct()">+ Add Product</button>
  </div>

  <div class="actions">
    <button class="btn-reset2" onclick="resetToDefaults()">Reset Defaults</button>
    <button class="btn-save" onclick="saveAll()">Save &amp; Apply Changes →</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="supabase.js"></script>
<script>
const DEFAULT_PRODUCTS = {
  "Castor Oil":          { price: 850,  group: "Hair Oils" },
  "Onion Oil":           { price: 950,  group: "Hair Oils" },
  "Almond Oil":          { price: 1100, group: "Hair Oils" },
  "Argan Oil":           { price: 1400, group: "Hair Oils" },
  "Rosemary Oil":        { price: 900,  group: "Hair Oils" },
  "Mustard Oil":         { price: 700,  group: "Food Oils" },
  "Coconut Oil (Food)":  { price: 1200, group: "Food Oils" },
  "Olive Oil":           { price: 1600, group: "Food Oils" },
  "Sunflower Oil":       { price: 650,  group: "Food Oils" },
  "Sesame Oil":          { price: 1050, group: "Food Oils" },
};
const DEFAULT_SIZES = ['50ml','100ml','150ml','250ml','500ml','1 Liter','5 Liter'];
const DEFAULT_CONTACT = { phone:'03368936834', email:'nutrimethofficial@gmail.com', web:'www.nutrimeth.com', addr:'Scheme 33 post office society' };

let products = {};
let sizes    = [];
let contact  = { ...DEFAULT_CONTACT };

/* ── RENDER ── */
function renderSizes() {
  const list = document.getElementById('sizeList');
  list.innerHTML = sizes.map((s, i) => `
    <div class="size-chip">
      <span>${s}</span>
      <button onclick="removeSize(${i})" title="Remove">✕</button>
    </div>`).join('');
}

function renderProducts() {
  const list = document.getElementById('productList');
  const entries = Object.entries(products);
  if (entries.length === 0) {
    list.innerHTML = '<p style="color:#aab;font-size:13px;font-style:italic">No products. Click "+ Add Product" to start.</p>';
    return;
  }
  list.innerHTML = entries.map(([name, data], i) => `
    <div class="product-row" data-key="${i}">
      <span class="row-label">Name</span>
      <input type="text" value="${escHtml(name)}" data-field="name" data-idx="${i}" onchange="updateProduct(${i}, this)">
      <span class="row-label">Group</span>
      <input type="text" class="group-f" value="${escHtml(data.group)}" data-field="group" data-idx="${i}" onchange="updateProduct(${i}, this)">
      <span class="row-label">Base Price</span>
      <input type="number" class="price-f" value="${data.price}" min="0" data-field="price" data-idx="${i}" onchange="updateProduct(${i}, this)">
      <button class="btn-del-sm" onclick="deleteProduct(${i})">✕</button>
    </div>`).join('');
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── PRODUCT ACTIONS ── */
function updateProduct(idx, inp) {
  const entries = Object.entries(products);
  const [oldName, data] = entries[idx];
  const field = inp.getAttribute('data-field');

  if (field === 'name') {
    const newName = inp.value.trim();
    if (!newName || newName === oldName) return;
    // Rename key
    const newProducts = {};
    entries.forEach(([k, v], i) => {
      newProducts[i === idx ? newName : k] = v;
    });
    products = newProducts;
  } else if (field === 'group') {
    data.group = inp.value.trim();
  } else if (field === 'price') {
    data.price = Math.max(0, parseInt(inp.value) || 0);
    inp.value = data.price;
  }
}

function deleteProduct(idx) {
  const entries = Object.entries(products);
  entries.splice(idx, 1);
  products = Object.fromEntries(entries);
  renderProducts();
}

function addProduct() {
  const name = `New Product ${Object.keys(products).length + 1}`;
  products[name] = { price: 500, group: 'General' };
  renderProducts();
}

/* ── SIZE ACTIONS ── */
function removeSize(i) {
  sizes.splice(i, 1);
  renderSizes();
}

function addSize() {
  const val = document.getElementById('newSizeInput').value.trim();
  if (!val) { showToast('⚠ Enter a size value.'); return; }
  if (sizes.includes(val)) { showToast('⚠ Size already exists.'); return; }
  sizes.push(val);
  document.getElementById('newSizeInput').value = '';
  renderSizes();
}

/* ── LOAD FROM SUPABASE ── */
async function loadData() {
  try {
    const cfg = await loadGlobalConfig();
    if (cfg) {
      if (cfg.products) products = cfg.products;
      else products = { ...DEFAULT_PRODUCTS };
      if (cfg.sizes) sizes = cfg.sizes;
      else sizes = [...DEFAULT_SIZES];
      if (cfg.contact) {
        contact = cfg.contact;
        document.getElementById('ctPhone').value = contact.phone || '';
        document.getElementById('ctEmail').value = contact.email || '';
        document.getElementById('ctWeb').value   = contact.web   || '';
        document.getElementById('ctAddr').value  = contact.addr  || '';
      }
    } else {
      products = { ...DEFAULT_PRODUCTS };
      sizes    = [...DEFAULT_SIZES];
    }
  } catch(e) {
    console.warn('Load error:', e);
    products = { ...DEFAULT_PRODUCTS };
    sizes    = [...DEFAULT_SIZES];
  }
  renderSizes();
  renderProducts();
  document.getElementById('loadingOverlay').style.display = 'none';
}

/* ── SAVE TO SUPABASE ── */
async function saveAll() {
  // Collect current product name changes from DOM before saving
  document.querySelectorAll('#productList input[data-field="name"]').forEach(inp => {
    const idx = parseInt(inp.getAttribute('data-idx'));
    const entries = Object.entries(products);
    if (entries[idx]) {
      const [oldName, data] = entries[idx];
      const newName = inp.value.trim();
      if (newName && newName !== oldName) {
        delete products[oldName];
        products[newName] = data;
      }
    }
  });

  contact = {
    phone: document.getElementById('ctPhone').value.trim() || contact.phone,
    email: document.getElementById('ctEmail').value.trim() || contact.email,
    web:   document.getElementById('ctWeb').value.trim()   || contact.web,
    addr:  document.getElementById('ctAddr').value.trim()  || contact.addr,
  };

  showToast('Saving…');
  try {
    const result = await saveGlobalConfig({ products, sizes, contact });
    if (result.success) {
      showToast('✓ Changes saved! Reflected on all invoices.');
      renderProducts();
      renderSizes();
    } else {
      showToast('⚠ Save failed: ' + (result.error || 'Unknown error'));
    }
  } catch(e) {
    showToast('⚠ Error: ' + e.message);
  }
}

function resetToDefaults() {
  if (!confirm('Reset products and sizes to defaults?')) return;
  products = { ...DEFAULT_PRODUCTS };
  sizes    = [...DEFAULT_SIZES];
  renderProducts();
  renderSizes();
  showToast('Reset to defaults. Click "Save & Apply" to update.');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

loadData();
</script>
</body>
</html>
